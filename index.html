<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta id="themeColorMeta" name="theme-color" content="#fafaf9" />
    <title>物理化學筆記</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          if (stored === "light" || stored === "dark") {
            document.documentElement.dataset.theme = stored;
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"]],
          displayMath: [["$$", "$$"]],
          processEscapes: true
        },
        svg: { fontCache: "global" }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <div id="drawerBackdrop" class="drawer-backdrop"></div>

    <aside id="drawer" class="drawer" aria-label="Chapter navigation">
      <div class="drawer-head">
        <p class="eyebrow">Physical Chemistry</p>
        <h1 class="brand">物理化學筆記</h1>
      </div>

      <label class="search-box">
        <input
          id="searchInput"
          type="search"
          placeholder="搜尋 blackbody, Bohr, ΔE..."
        />
      </label>

      <section id="searchResults" class="search-results" hidden></section>

      <nav id="pageNav" class="page-nav"></nav>
    </aside>

    <div class="site-main">
      <header class="site-header">
        <button id="menuBtn" class="menu-btn" aria-label="Open menu">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h2 class="site-title" id="siteTitle">Quantum Theory</h2>
        <button id="themeBtn" class="theme-btn" aria-label="Toggle theme" title="切換淺色/深色">
          <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </header>

      <main class="reader">
        <div class="reader-head">
          <p class="eyebrow" id="pageEyebrow">Page 01</p>
          <h1 class="page-title" id="pageTitle">Quantum Theory</h1>
        </div>
        <article id="noteContent" class="note-content"></article>
        <nav id="pagePager" class="page-pager" aria-label="Page navigation"></nav>
      </main>
    </div>

    <script src="units-data.js"></script>
    <script src="notes-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
